services:
  app:
    networks:
      - app-network
    build:
      context: . # Dockerfile이 있는 디렉토리
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATASOURCE_URL=jdbc:mysql://mysql:3306/interview?allowPublicKeyRetrieval=true&useSSL=false
      - DATASOURCE_USERNAME=root
      - DATASOURCE_PASSWORD=root
      - JWT_SECRET_KEY=0878a3d01aad7c99051fd7687cddded9d138dc96cf767d9ef8753a62a2d7022820f956bf33d0d61c6f58cfe2176af8718675b2708a013207b27140bab3d456a0
      - KAKAO_CLIENT_ID=ddd4e334627d4eb89fc783a43641bd3c
      - KAKAO_REDIRECT_URI=http://localhost:8080/login/oauth2/code/kakao
      - MAIL_PORT=465
      - MAIL_ADDRESS=tichall001@gmail.com
      - APP_PASSWORD=vbpu mczn cqve bffg
      - NAVER_CLIENT_ID=OrI41LGQnXbX1lQecSUB
      - NAVER_REDIRECT_URI=http://localhost:8080/login/oauth2/code/naver
      - NAVER_SECRET=NBfBuaOwO0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
  mysql:
    networks:
      - app-network
    image: mysql:8.0
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: interview
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    networks:
      - app-network
    image: redis:latest
    ports:
      - "6379:6379"

networks:
  app-network:
    driver: bridge