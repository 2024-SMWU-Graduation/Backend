name: Docker Blue-Green Deployment

on:
  push:
    branches:
      - main
      - develop
      - feature/41-cd # Script 확인용 Branch 설정

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 현재 Repository의 코드를 Github Actions 실행 환경으로 다운로드
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t tichall111/easy-terview:latest .
          docker push tichall111/easy-terview:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH into EC2 - Move to project directory
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/project/easy-terview/
            echo "✅ Moved to project directory"

      - name: SSH into EC2 - Check active container
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ACTIVE_PORT=$(docker ps --format '{{.Ports}}' | awk -F '->' '{print $1}' | awk -F ':' '{print $2}' | head -n 1)
            if [ "$ACTIVE_PORT" == "8080" ]; then
              echo "🔵 Active container: BLUE (8080)"
              # 기존 변수가 존재하면 업데이트, 존재하지 않으면 추가하기
              grep -q "^NEW_PORT=" /home/ubuntu/project/easy-terview/.env-cd && sed -i 's/^NEW_PORT=.*/NEW_PORT=8081/' /home/ubuntu/project/easy-terview/.env-cd || echo "NEW_PORT=8081" >> /home/ubuntu/project/easy-terview/.env-cd
              grep -q "^OLD_APP=" /home/ubuntu/project/easy-terview/.env-cd && sed -i 's/^OLD_APP=.*/OLD_APP=app_blue/' /home/ubuntu/project/easy-terview/.env-cd || echo "OLD_APP=app_blue" >> /home/ubuntu/project/easy-terview/.env-cd
              grep -q "^NEW_APP=" /home/ubuntu/project/easy-terview/.env-cd && sed -i 's/^NEW_APP=.*/NEW_APP=app_green/' /home/ubuntu/project/easy-terview/.env-cd || echo "NEW_APP=app_green" >> /home/ubuntu/project/easy-terview/.env-cd
            else
              echo "🟢 Active container: GREEN (8081)"
              grep -q "^NEW_PORT=" /home/ubuntu/project/easy-terview/.env-cd && sed -i 's/^NEW_PORT=.*/NEW_PORT=8080/' /home/ubuntu/project/easy-terview/.env-cd || echo "NEW_PORT=8080" >> /home/ubuntu/project/easy-terview/.env-cd
              grep -q "^OLD_APP=" /home/ubuntu/project/easy-terview/.env-cd && sed -i 's/^OLD_APP=.*/OLD_APP=app_green/' /home/ubuntu/project/easy-terview/.env-cd || echo "OLD_APP=app_green" >> /home/ubuntu/project/easy-terview/.env-cd
              grep -q "^NEW_APP=" /home/ubuntu/project/easy-terview/.env-cd && sed -i 's/^NEW_APP=.*/NEW_APP=app_blue/' /home/ubuntu/project/easy-terview/.env-cd || echo "NEW_APP=app_blue" >> /home/ubuntu/project/easy-terview/.env-cd
            fi

      - name: SSH into EC2 - Pull new Docker image
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # .env-cd 파일 로드
            set -a
            source /home/ubuntu/project/easy-terview/.env-cd
            set +a
            
            cd /home/ubuntu/project/easy-terview/
            docker-compose pull $NEW_APP
            echo "✅ Pulled new image for $NEW_APP"

      - name: SSH into EC2 - Start new container
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # .env-cd 파일 로드
            set -a
            source /home/ubuntu/project/easy-terview/.env-cd
            set +a
            
            cd /home/ubuntu/project/easy-terview/
            docker-compose up -d --no-deps --build $NEW_APP
            echo "✅ Started new container: $NEW_APP"

      - name: Wait for new container to start
        run: sleep 180

      - name: SSH into EC2 - Verify new container is running
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # .env-cd 파일 로드
            set -a
            source /home/ubuntu/project/easy-terview/.env-cd
            set +a
            
            if [ "$(docker ps -q -f name=$NEW_APP)" ]; then
              echo "✅ New app container is running successfully!"
            else
              echo "❌ New app failed to start!"
              exit 1
            fi

      - name: SSH into EC2 - Update ALB Target Group
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # .env-cd 파일 로드
            set -a
            source /home/ubuntu/project/easy-terview/.env-cd
            set +a
            
            if [ "$NEW_APP" == "app_green" ]; then
              echo "🔄 Switching to GREEN target group"
              aws elbv2 modify-rule --rule-arn ${{ secrets.API_LISTENER_RULE_ARN }} --actions Type=forward,TargetGroupArn=${{ secrets.GREEN_TARGET_GROUP_ARN }}
              aws elbv2 modify-rule --rule-arn ${{ secrets.OAUTH_LISTENER_RULE_ARN }} --actions Type=forward,TargetGroupArn=${{ secrets.GREEN_TARGET_GROUP_ARN }}
              aws elbv2 modify-rule --rule-arn ${{ secrets.OAUTH_2_LISTENER_RULE_ARN }} --actions Type=forward,TargetGroupArn=${{ secrets.GREEN_TARGET_GROUP_ARN }}
            else
              echo "🔄 Switching to BLUE target group"
              aws elbv2 modify-rule --rule-arn ${{ secrets.API_LISTENER_RULE_ARN }} --actions Type=forward,TargetGroupArn=${{ secrets.BLUE_TARGET_GROUP_ARN }}
              aws elbv2 modify-rule --rule-arn ${{ secrets.OAUTH_LISTENER_RULE_ARN }} --actions Type=forward,TargetGroupArn=${{ secrets.BLUE_TARGET_GROUP_ARN }}
              aws elbv2 modify-rule --rule-arn ${{ secrets.OAUTH_2_LISTENER_RULE_ARN }} --actions Type=forward,TargetGroupArn=${{ secrets.BLUE_TARGET_GROUP_ARN }}
            fi
            echo "✅ ALB target group updated"

      - name: SSH into EC2 - Stop and Remove Old Container
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # .env-cd 파일 로드
            set -a
            source /home/ubuntu/project/easy-terview/.env-cd
            set +a
            
            docker-compose stop $OLD_APP
            docker-compose rm -f $OLD_APP
            echo "✅ Stopped and removed old container: $OLD_APP"